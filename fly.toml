# fly.toml app configuration file generated by `flyctl launch`
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "file-upload-app"
primary_region = "sea"

[build]
  dockerfile = "./Dockerfile"

[env]
  PORT = "5000"

[[services]]
  internal_port = 5000
  processes = ["app"]
  protocol = "tcp"
  
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
